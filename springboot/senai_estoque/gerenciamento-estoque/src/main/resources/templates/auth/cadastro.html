<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Sistema de Estoque e Patrimonio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="senai-main">
        <section class="senai-form-section">
            <div class="senai-form-card">
                <h1 class="senai-title small">Cadastro</h1>
                <p class="senai-subtitle">Somente funcionarios com NIF autorizado podem criar conta.</p>

                <div th:if="${erro}" class="senai-alert senai-alert-error">
                    <p th:text="${erro}"></p>
                </div>

                <form th:action="@{/auth/cadastro}" method="post" class="senai-form">
                    <label class="senai-label" for="nome">Nome</label>
                    <input class="senai-input" id="nome" name="nome" type="text" maxlength="120"
                           th:value="${nomeDigitado}" placeholder="Digite seu nome" required>

                    <label class="senai-label" for="nif">NIF</label>
                    <input class="senai-input" id="nif" name="nif" type="text" maxlength="20"
                           th:value="${nifDigitado}" placeholder="Digite seu NIF" required>

                    <label class="senai-label" for="senha">Senha</label>
                    <input class="senai-input" id="senha" name="senha" type="password" minlength="4"
                           placeholder="Crie uma senha" required>

                    <button class="senai-button full-width" type="submit">Criar conta</button>
                </form>

                <p class="senai-helper">
                    Ja possui conta?
                    <a class="senai-link" th:href="@{/login}">Entrar</a>
                </p>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
