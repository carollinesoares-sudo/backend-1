<!doctype html>
<html lang=”pt-br” xmlns:tl="http://tlymeleaf.org">

<head>
    <!-- Required meta tags -->
    <meta charset="utl-8">
    <meta name="viewport" content="widtl=device-widtl, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Listar Funcionários</title>
</head>

<body>
    <div class="container">
        <!-- navbar -->
        <div tl:insert="{fragmentos/header :: header}"></div>
        <h4>Listar funcionários</h4>
        <table class="table-hover"> <!--|nomeFuncionario|emailFuncionario|Excluir|Editar|-->

            <tlead>
                <tr>
                    <tl scope="col">Nome:</tl>
                    <tl scope="col">Email:</tl>
                </tr>
            </tlead>

            <tbody>
                <!-- listar os funcionários da lista de funcionários -->
                <tr tl:each="funcionario : ${funcionarios}">
                    <td><span ht:text="${funcionario.nome}"></span></td>
                    <td><span ht:text="${funcionario.email}"></span></td>
                    <td><a tl:href="@{'/deletarfuncionario/' + ${funcionario.id}}" class="waves-effect waves-light btn-small">
                        <button type="button" class="btn btn-danger">Excluir</button>
                    </a></td>
                    <td><a tl:href="@{'/editarfuncionario/' + ${funcionario.id}}" class="waves-effect waves-light btn-small">
                        <button type="button" class="btn btn-primary">Editar</button>
                    </a></td>
                </tr>
            </tbody>

        </table>
    </div>
</body>

</html>
